<!DOCTYPE html>
<html lang='en'>
<head>

<body>
    <h3> 1. position: static; </h3>
    <div class="box"> box </div>
    <div class="box box2"> box2 </div>
    <div class="box"> box </div>


    <h3> 2. position: relative; </h3>
    <div class="box"> box </div>
    <div class="box box3"> box3 </div>
    <div class="box"> box </div>

    <h3> 3. position: absolute; </h3>
    <div class="box"> box </div>
    <div class="box box4"> box4 </div>
    <div class="box"> box </div>

    <h3> 4. position: fixed; </h3>
    <div class="box"> box </div>
    <div class="box box5"> box5 </div>
    <div class="box"> box </div>

    <h3> 5. position: absolute; -> 가장 가까운 position의 상위요소를 기준으로 하여 따라간다 </h3>
    <div class="parent">
        <div class="box"> box </div>
        <div class="box box6"> box6 </div>
        <div class="box"> box </div>
    </div>

    <h3> 6. position: absolute; </h3>
    <div class="parent">
        <div class="box"> box </div>
        <div class="box box6"> box6 </div>
        <div class="box"> box </div>
    </div>

</body>
