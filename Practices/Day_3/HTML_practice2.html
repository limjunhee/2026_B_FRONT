<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>HTML_practice 2</title>
    </head> 
    <body>
    
        카테고리
        <select>
            <option>공지사항</option>
            <option>자유게시판</option>
        </select> <br />

        <input type="text" placeholder="작성자" />
        <input type="password" placeholder="비밀번호" />
        <hr>
        <input type="text" placeholder="게시물 제목 입력" />
        <hr>
        <textarea cols="50" rows="10" placeholder="게시물 내용 입력"></textarea> <br/>
        공개선택 <input type="radio" name="공개여부"> 공개글 <input type="radio" name="공개여부"> 비공개글 <br />
        공유선택 <input type="checkbox" name="공유수단" /> 카카오톡 <input type="checkbox" name="공유수단" /> 트위터 <input type="checkbox" name="공유수단" /> 네이버 카페 <br>
        작성일자 <input type="datetime-local" /> 작성시간 <input type="time" name="작성시간" />
        <hr>
        첨부파일 <input type="file" />      <br /><br />
        <button type="button">목록보기</button>
        <button type="submit">글쓰기</button>
        <input type="reset" value="다시쓰기" />
    </body> 

</html>
