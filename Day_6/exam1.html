<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    
    <!-- 방법 2: CSS 스타일 시트 작성 -->
    <style>
        h4{ color: blue;}
    </style>

    <!-- 방법 3: 외부 .css 파일 작성해서 연결 -->
    <link rel='stylesheet' href='exam1.css'> <!-- CSS 파일 연결하는 마크업 -->

</head>
<body>
    <!-- 
        HTML : 이동 가능한 텍스트 마크업 언어 ex) 뼈대
        JS : 자바스크립트 프로그래밍 언어 ex) 동적 이벤트
        CSS : Cascading style sheet(위에서 아래로 읽는? 스타일 시트라는 뜻) ex) 옷
              -> 위에서 아래로 HTML 꾸미기 시트를 덮는다.
    -->

    <!-- CSS 적용 방법 1 : 인라인 방법(마크업 내 style 속성 이용) 
        (비추천, 유지보수가 힘듦) React에선 이 방법을 사용하지 않음-->
    <h3 style="color: red;"> css 적용 방법 1</h3>

    <!-- css 적용 방법 2 : HTML head 내에 <style> 마크업 문법 작성하기 -->
    <h4>css 적용 방법 2</h4>

    <!-- css 적용 방법 3 : .css 파일을 만들어서 거기다가 css 문법을 작성하고 <head>마크업에서 연결
        재사용하기에 좋다. -->
    <h5>css 적용 방법 3</h5>


    <h6> css 선택자 h6 </h6>
    <h6 class="구역1"> css 선택자 .className</h6>
    <h6 id="구역2"> css 선택자 .id</h6>


    <!-- 주의: 하위요소 마크업 작성 시 tab 습관화할 것(틀려도 상관 없으나 다른 언어에서는 민감할 수도 있음) -->
    <div> <!--상위 요소 body, 하위 요소 h3, ol, li-->
        <h3> 학생명단 </h3> <!-- 상위요소 div, 하위요소는 X-->
        
        <ol> <!-- 상위요소 div, 하위요소는 li -->
            <li id="이름1"> 유재석 </li>
            <li> 
                <h3> 강호동 </h3> 
            </li>
        </ol>
    </div>


    <h2> CSS 주요 텍스트 속성 </h2>
    <h1 class="title"> 강아지 </h1>
    <div class="content"> 
        개는 중형 동물이자 가장 널리 분포하며 개체 수가 가장 많은 지상 동물 중 하나이며 가축화된 회색늑대이다. 
        개는 인류가 최초로 가축으로 삼은 동물로 알려져 있으며, 역사적으로 반려견, 사냥견으로서 길러 왔다.
    </div>
    <p class="작성자"> 위키백과 </p>
</body>
<script></script>
</html>
