<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='exam2.css'>
</head>
<body>
    <h3>display: flex 하위 요소들을 배치하는 방법</h3>
    <h4>1. flex-wrap: nowrap;</h4>
    <div class="flexbox1">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>

    <h4>2. flex-wrap: wrap;</h4>
    <div class="flexbox2">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>

    <h4>3. flex-direction: row;</h4>
    <div class="flexbox3">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>

    <h4>4. flex-direction: column;</h4>
    <div class="flexbox4">
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
    </div>
</body>
</html>
