<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Cafe</title>
        <link rel="stylesheet" href="kiosk.css" />
    </head>
    <body>
    <div class="페이지">
        <header>
            <div class="헤더">주문 내역</div>
        </header>
    
        <section>
            <div class="섹션">
                <img src="../img/latte.jpg">

                <div class="정보">
                    <div>카페 라떼</div>
                    <div>5,000원</div>
                </div>

                <div class="수량선택">
                    <button class="마이너스버튼">-</button>
                    <div class="개수">1</div>
                    <button class="플러스버튼">+</button>
                </div>
            </div>
        </section>

        <footer>
            <div class="푸터">
                <span class="가격과수량">
                    <div class="가격">총 금액 (₩) <a>5,000</a></div>
                    <div class="수량">주문 수량(개) <a>1</a></div>
                </span>
                <span class="버튼목록">
                    <button >추가 주문하기</button><br>
                    <button class="갈색버튼">결제하기</button>
                </span>
            </div>
        </footer>
    </div>
</body>
</html>
